# NOTICE!!! 按住shift/option可以鼠标复制
# NOTICE!!! 按住shift/option可以鼠标复制
# NOTICE!!! 按住shift/option可以鼠标复制

# !!!Requirement
# first clone the TPM
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# if using macos
# make vim modejclipboard work:
# brew install reattach-to-user-namespace

# Use the tmux-256 terminal
set-option -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -as terminal-overrides ",*:RGB"

# Set fish as default shell
set -g default-command /opt/homebrew/bin/fish
set -g default-shell /opt/homebrew/bin/fish

# Undercurl
# set -g default-terminal "${TERM}"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

# 0 is too far from ` ;)
set -g base-index 1

# Automatically set window title
set-window-option -g automatic-rename on
set-option -g set-titles on

# border color
set -g pane-active-border-style bg=default,fg=magenta
set -g pane-border-style fg=cyan

# Set vi mode
# <leader-[> in to vi mode
set -g status-keys vi
setw -g mode-keys vi

# set mouse on
set-option -g mouse on
set-option -s set-clipboard off

# Vim style in copy-mode
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
if-shell "uname | grep -q Darwin" {
  # Macos must install reattach-to-user-namespace first
  bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'reattach-to-user-namespace pbcopy'
  bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'reattach-to-user-namespace pbcopy'
} {
  bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
  bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
}

# Ctrl + Shift + Left move window left and follow it
bind-key -n C-S-Left swap-window -t -1 \; select-window -t -1
# Ctrl + Shift + Right move window right and follow it
bind-key -n C-S-Right swap-window -t +1 \; select-window -t +1
# Prefix + P paste buffer

bind P paste-buffer

set -g history-limit 10000

# ===============================
# 常用快捷键速查（默认 Prefix = Ctrl-b）
# 会话管理
# Prefix + d            分离当前会话（detach）
# tmux ls               查看会话列表
# tmux attach -t <name> 重新连接指定会话
#
# 窗口管理
# Prefix + c            新建窗口
# Prefix + ,            重命名窗口
# Prefix + w            列出窗口并快速选择
# Prefix + n / p        切换下一个 / 上一个窗口
# Prefix + &            关闭当前窗口
# Alt + i / o           本配置下切换上一个 / 下一个窗口
# Ctrl + Shift + ← / →  本配置下将窗口左移 / 右移，并跟随焦点
#
# Pane 管理
# Prefix + %            左右分屏
# Prefix + "            上下分屏
# Prefix + x            关闭当前 Pane
# Prefix + z            最大化 / 还原当前 Pane
# Prefix + q            显示 Pane 编号并快速跳转
# Alt + h / j / k / l   本配置下无前缀切换 Pane
#
# 复制模式（已启用 vi 风格）
# Prefix + [            进入 copy-mode
# v                     开始选择
# y / Enter             复制并退出（已接系统剪贴板）
# Prefix + ] / Prefix + P 粘贴
#
# 实用技巧
# Prefix + r            重新加载 ~/.tmux.conf
# Prefix + I            通过 TPM 安装插件
# Prefix + U            通过 TPM 更新插件
# Prefix + Alt + u      通过 TPM 清理插件
# 已开启 mouse on       支持点击切换 Pane、滚轮滚动历史
# history-limit = 10000 支持更长滚动回看
# ===============================
# key binging

# Use Alt-vim keys without prefix key to switch panes
bind -n M-h select-pane -L
bind -n M-j select-pane -D 
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Alt-i Alt-o to switch windows
bind -n M-i previous-window
bind -n M-o next-window

# reload tmux.conf
bind r source-file ~/.tmux.conf

# ===============================
# Plugin Manage
# ===============================
# prefix + I install plugins
# prefix + U update plugins
# prefix + alt + u clean plugins

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-logging'

# theme
# set -g @plugin "22GNUs/tokyo-night-tmux"
set -g @plugin "janoamaral/tokyo-night-tmux"
set -g @tokyo-night-tmux_theme night
set -g @tokyo-night-tmux_transparent 1

# number styles
set -g @tokyo-night-tmux_window_id_style digital
set -g @tokyo-night-tmux_pane_id_style hsquare
set -g @tokyo-night-tmux_zoom_id_style dsquare

# window styles
# Icon styles
set -g @tokyo-night-tmux_terminal_icon 
set -g @tokyo-night-tmux_active_terminal_icon 

# No extra spaces between icons
set -g @tokyo-night-tmux_window_tidy_icons 1

# wigets
set -g @tokyo-night-tmux_show_datetime 0
set -g @tokyo-night-tmux_date_format YMD
set -g @tokyo-night-tmux_time_format 24H

set -g @tokyo-night-tmux_show_path 1
set -g @tokyo-night-tmux_path_format relative # 'relative' or 'full'

# extended-keys
set -g extended-keys on
set -g extended-keys-format csi-u


# catppuccin
# set -g @plugin '22GNUs/tmux'
# set -g @catppuccin_window_tabs_enabled on # or off to disable window_tabs

# set theme
# set -g @themepack 'powerline/block/cyan'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'git@github.com/user/plugin'
# set -g @plugin 'git@bitbucket.com/user/plugin'

# Run fish shell "develop"
bind-key -r l run-shell "develop"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# ===============================
