# Hunk user config
# Only theme configured; other view options keep Hunk defaults.
# Palette source: official TokyoNight dark/night colors, tuned for Ghostty #0a0a0d.

theme = "custom"
mode = "stack"

[custom_theme]
base = "midnight"
label = "TokyoNight Dark"
background = "#0a0a0d"
panel = "#101016"
panelAlt = "#171824"
border = "#30364f"
accent = "#7aa2f7"
accentMuted = "#2f4165"
text = "#c0caf5"
muted = "#737aa2"
addedBg = "#19363f"
removedBg = "#3f2029"
movedAddedBg = "#171b28"
movedRemovedBg = "#261f3d"
contextBg = "#0e0f16"
addedContentBg = "#214653"
removedContentBg = "#4a2a36"
contextContentBg = "#0e0f16"
addedSignColor = "#9ece6a"
removedSignColor = "#f7768e"
lineNumberBg = "#0a0a0d"
lineNumberFg = "#3b4261"
selectedHunk = "#243153"
badgeAdded = "#449dab"
badgeRemoved = "#914c54"
badgeNeutral = "#6183bb"
fileNew = "#9ece6a"
fileDeleted = "#f7768e"
fileRenamed = "#e0af68"
fileModified = "#bb9af7"
fileUntracked = "#7dcfff"
noteBorder = "#bb9af7"
noteBackground = "#161621"
noteTitleBackground = "#22283d"
noteTitleText = "#c0caf5"

[custom_theme.syntax]
default = "#c0caf5"
keyword = "#bb9af7"
string = "#9ece6a"
comment = "#565f89"
number = "#ff9e64"
function = "#7aa2f7"
property = "#7dcfff"
type = "#bb9af7"
punctuation = "#89ddff"
